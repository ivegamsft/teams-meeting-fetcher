name: Build Lambda - Authorizer

on:
  push:
    branches:
      - develop
    paths:
      - "apps/aws-lambda-authorizer/**"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "apps/aws-lambda-authorizer/**"
  workflow_dispatch:

jobs:
  build:
    name: Build Authorizer Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install Authorizer dependencies
        run: |
          cd apps/aws-lambda-authorizer
          npm ci

      - name: Validate authorizer
        run: |
          cd apps/aws-lambda-authorizer
          node -c authorizer.js

      - name: Package Lambda
        run: |
          cd apps/aws-lambda-authorizer
          rm -f authorizer.zip
          zip -r authorizer.zip authorizer.js node_modules -x "*.git*" "*.md"

      - name: Verify package
        run: |
          cd apps/aws-lambda-authorizer
          if [ ! -f authorizer.zip ]; then
            echo "Package failed: authorizer.zip not created"
            exit 1
          fi
          ZIPSIZE=$(stat -f%z authorizer.zip 2>/dev/null || stat -c%s authorizer.zip)
          echo "Authorizer package size: ${ZIPSIZE} bytes"

      - name: Upload Authorizer Artifact
        uses: actions/upload-artifact@v3
        with:
          name: lambda-authorizer-artifact
          path: apps/aws-lambda-authorizer/authorizer.zip
          retention-days: 30
