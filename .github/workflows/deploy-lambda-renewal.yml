name: Deploy Lambda - Subscription Renewal

on:
  push:
    branches:
      - main
    paths:
      - "scenarios/lambda/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VERSION: "1.14.3"
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
  TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}
  TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}

jobs:
  deploy:
    name: Deploy Renewal Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Resolve Lambda name
        id: tf-output
        run: |
          cd iac
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=$TF_STATE_REGION" \
            -backend-config="dynamodb_table=$TF_STATE_LOCK_TABLE" \
            -backend-config="encrypt=true"
          LAMBDA_NAME=$(terraform output -raw aws_renewal_function_name)
          echo "lambda_name=$LAMBDA_NAME" >> $GITHUB_OUTPUT

      - name: Use Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          cd scenarios/lambda
          pip install -r requirements.txt -t .

      - name: Package Lambda
        run: |
          cd scenarios/lambda
          rm -f renewal-function.zip
          zip -r renewal-function.zip renewal-function.py requests certifi charset_normalizer idna urllib3 \
            requests-*.dist-info certifi-*.dist-info charset_normalizer-*.dist-info idna-*.dist-info urllib3-*.dist-info \
            -x "*.git*" "*.md" "__pycache__/*" "*.pyc"

      - name: Deploy Lambda code
        run: |
          aws lambda update-function-code \
            --function-name ${{ steps.tf-output.outputs.lambda_name }} \
            --zip-file fileb://scenarios/lambda/renewal-function.zip \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ steps.tf-output.outputs.lambda_name }} \
            --region ${{ env.AWS_REGION }}

      - name: Deployment Summary
        run: |
          echo "Renewal Lambda deployed"
          echo "Function: ${{ steps.tf-output.outputs.lambda_name }}"
          echo "Region: ${{ env.AWS_REGION }}"
