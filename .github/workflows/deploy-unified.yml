name: Deploy Unified Infrastructure

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# REQUIRED GITHUB SECRETS:
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# AWS_ROLE_ARN                  - IAM role ARN for OIDC authentication
# AZURE_CLIENT_ID               - Azure App Registration client ID
# AZURE_TENANT_ID               - Azure AD tenant ID
# AZURE_SUBSCRIPTION_ID         - Azure subscription ID
# CLIENT_STATE                  - Client state secret for Graph API webhooks
#
# REQUIRED GITHUB VARIABLES:
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# AWS_REGION                    - AWS deployment region (e.g., us-east-1)
# AWS_ACCOUNT_ID                - AWS account ID (12 digits)
# TF_STATE_BUCKET               - S3 bucket for Terraform state
# TF_STATE_KEY                  - S3 key for Terraform state file
# TF_STATE_REGION               - S3 bucket region
# TF_STATE_LOCK_TABLE           - DynamoDB table for state locking
# WEBHOOK_BUCKET_NAME           - S3 bucket name for webhook storage
# TRANSCRIPT_BUCKET_NAME        - S3 bucket name for transcript storage
# CHECKPOINT_BUCKET_NAME        - S3 bucket name for checkpoint storage
# BOT_MESSAGING_ENDPOINT        - Teams bot messaging endpoint URL
# KEY_VAULT_NAME                - Azure Key Vault name for firewall management
# RESOURCE_GROUP_NAME           - Azure resource group name
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

on:
  push:
    branches:
      - main
    paths:
      - "apps/aws-lambda/**"
      - "iac/*.tf"
      - "iac/aws/**"
      - "iac/azure/**"
      - "scenarios/lambda/**"
  workflow_dispatch:
    inputs:
      mode:
        description: "Deployment mode"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
      environment:
        description: "Environment to deploy to"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VERSION: "1.14.3"
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
  TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}
  TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}

permissions:
  contents: read
  id-token: write
  actions: write

jobs:
  infrastructure:
    name: Infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ github.event.inputs.mode == 'apply' && format('aws-{0}', github.event.inputs.environment || 'dev') || null }}
    defaults:
      run:
        shell: bash
        working-directory: iac
    outputs:
      lambda_function_name: ${{ steps.tf-output.outputs.lambda_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=$TF_STATE_REGION" \
            -backend-config="dynamodb_table=$TF_STATE_LOCK_TABLE" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        run: terraform validate

      - name: Get runner IP for Key Vault firewall
        id: firewall_prep
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          CURRENT_IP=$(curl -s https://api.ipify.org)
          if [ -z "$CURRENT_IP" ]; then
            echo "Failed to detect runner IP"
            exit 1
          fi
          # GitHub Actions runners can have multiple outbound IPs in the same
          # subnet. Use a /24 CIDR to cover all of them instead of a single /32.
          CIDR=$(echo "$CURRENT_IP" | sed 's/\.[0-9]*$/.0\/24/')
          echo "Detected runner IP: $CURRENT_IP — using CIDR: $CIDR"
          echo "ip=${CURRENT_IP}" >> "${GITHUB_OUTPUT}"
          echo "cidr=${CIDR}" >> "${GITHUB_OUTPUT}"

      - name: Enable Key Vault public access and add runner CIDR
        id: kv_firewall
        if: vars.KEY_VAULT_NAME != ''
        run: |
          set -euo pipefail
          RUNNER_CIDR="${{ steps.firewall_prep.outputs.cidr }}"

          echo "Enabling public network access on Key Vault..."
          az keyvault update \
            --name "${{ vars.KEY_VAULT_NAME }}" \
            --resource-group "${{ vars.RESOURCE_GROUP_NAME }}" \
            --public-network-access Enabled \
            --only-show-errors

          echo "Adding runner CIDR ${RUNNER_CIDR} to Key Vault firewall..."
          az keyvault network-rule add \
            --name "${{ vars.KEY_VAULT_NAME }}" \
            --resource-group "${{ vars.RESOURCE_GROUP_NAME }}" \
            --ip-address "${RUNNER_CIDR}" \
            --only-show-errors || true
        working-directory: ${{ github.workspace }}

      - name: Wait for firewall propagation
        if: vars.KEY_VAULT_NAME != ''
        run: sleep 30
        working-directory: ${{ github.workspace }}

      - name: Create placeholder Lambda packages
        working-directory: ${{ github.workspace }}
        run: |
          echo "placeholder" > /tmp/placeholder.js
          for dir in apps/aws-lambda apps/aws-lambda-authorizer apps/aws-lambda-eventhub; do
            mkdir -p "$dir"
          done
          mkdir -p scenarios/lambda/meeting-bot
          cd /tmp && zip placeholder.zip placeholder.js
          cp /tmp/placeholder.zip $GITHUB_WORKSPACE/apps/aws-lambda/lambda.zip
          cp /tmp/placeholder.zip $GITHUB_WORKSPACE/apps/aws-lambda-authorizer/authorizer.zip
          cp /tmp/placeholder.zip $GITHUB_WORKSPACE/apps/aws-lambda-eventhub/lambda.zip
          cp /tmp/placeholder.zip $GITHUB_WORKSPACE/scenarios/lambda/meeting-bot/meeting-bot.zip

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan
        env:
          TF_VAR_use_oidc: "true"
          TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          TF_VAR_aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}
          TF_VAR_webhook_bucket_name: ${{ vars.WEBHOOK_BUCKET_NAME }}
          TF_VAR_transcript_bucket_name: ${{ vars.TRANSCRIPT_BUCKET_NAME }}
          TF_VAR_checkpoint_bucket_name: ${{ vars.CHECKPOINT_BUCKET_NAME }}
          TF_VAR_bot_messaging_endpoint: ${{ vars.BOT_MESSAGING_ENDPOINT }}
          TF_VAR_client_state: ${{ secrets.CLIENT_STATE }}
          TF_VAR_allowed_ip_addresses: '["${{ steps.firewall_prep.outputs.cidr }}"]'

      - name: Terraform apply
        if: github.event.inputs.mode == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Export Terraform outputs to GitHub Variables
        id: tf-output
        if: github.event.inputs.mode == 'apply'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          KV_NAME=$(terraform output -raw azure_key_vault_name)
          RG_NAME=$(terraform output -raw azure_resource_group_name)
          LAMBDA_NAME=$(terraform output -raw aws_lambda_function_name)

          echo "lambda_name=$LAMBDA_NAME" >> $GITHUB_OUTPUT
          echo "kv_name=$KV_NAME" >> $GITHUB_OUTPUT
          echo "rg_name=$RG_NAME" >> $GITHUB_OUTPUT

          echo "Exporting KEY_VAULT_NAME=${KV_NAME}..."
          gh variable set KEY_VAULT_NAME --body "${KV_NAME}" --repo "${{ github.repository }}" || \
            echo "::warning::Could not export KEY_VAULT_NAME. Set manually: gh variable set KEY_VAULT_NAME --body ${KV_NAME}"

          echo "Exporting RESOURCE_GROUP_NAME=${RG_NAME}..."
          gh variable set RESOURCE_GROUP_NAME --body "${RG_NAME}" --repo "${{ github.repository }}" || \
            echo "::warning::Could not export RESOURCE_GROUP_NAME. Set manually: gh variable set RESOURCE_GROUP_NAME --body ${RG_NAME}"

      - name: Remove runner CIDR from Key Vault firewall
        if: always() && vars.KEY_VAULT_NAME != '' && steps.firewall_prep.outputs.cidr != ''
        working-directory: ${{ github.workspace }}
        run: |
          az keyvault network-rule remove \
            --name "${{ vars.KEY_VAULT_NAME }}" \
            --resource-group "${{ vars.RESOURCE_GROUP_NAME }}" \
            --ip-address "${{ steps.firewall_prep.outputs.cidr }}" \
            --only-show-errors || true

  build:
    name: Build Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "apps/aws-lambda/package-lock.json"

      - name: Install Lambda dependencies
        run: |
          cd apps/aws-lambda
          npm ci

      - name: Package Lambda
        run: |
          cd apps/aws-lambda
          zip -r ../lambda.zip handler.js node_modules

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-artifact
          path: apps/lambda.zip
          retention-days: 1

  deploy-lambda:
    name: Deploy Lambda Code
    runs-on: ubuntu-latest
    needs: [infrastructure, build]
    if: github.event.inputs.mode == 'apply'
    environment:
      name: aws-${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-artifact
          path: .

      - name: Deploy Lambda code
        run: |
          aws lambda update-function-code \
            --function-name ${{ needs.infrastructure.outputs.lambda_function_name }} \
            --zip-file fileb://lambda.zip \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ needs.infrastructure.outputs.lambda_function_name }} \
            --region ${{ env.AWS_REGION }}

      - name: Deployment Summary
        run: |
          echo "Deployment Complete"
          echo "Lambda: ${{ needs.infrastructure.outputs.lambda_function_name }}"
          echo "Region: ${{ env.AWS_REGION }}"
