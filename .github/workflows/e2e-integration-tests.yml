name: E2E Integration Tests

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --coverage --testPathPattern="test/unit"

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm test -- --testPathPattern="test/integration"
        env:
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          BOT_APP_ID: ${{ secrets.BOT_APP_ID }}

  graph-api-tests:
    name: Graph API Integration
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Verify Graph API setup
        run: python scripts/graph/01-verify-setup.py
        env:
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}

      - name: Check subscriptions
        run: python scripts/graph/check-subscriptions.py
        env:
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}

  webhook-tests:
    name: Webhook Endpoint Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate test webhook payload
        run: |
          python -c "
          import json
          payload = {
            'value': [
              {
                'resourceData': {
                  'id': 'test-call-record-123'
                },
                'resourceEventType': 'microsoft.graph.callRecord/created'
              }
            ]
          }
          with open('test_webhook.json', 'w') as f:
            json.dump(payload, f)
          print('✅ Test webhook payload generated')
          "

      - name: Validate webhook payload
        run: |
          python -c "
          import json
          with open('test_webhook.json', 'r') as f:
            data = json.load(f)
          print(f'✅ Valid JSON: {len(data[\"value\"])} event(s)')
          "

  test-summary:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()
    steps:
      - name: All Tests Status
        run: |
          if [ "${{ needs.unit-tests.result }}" == "failure" ] || [ "${{ needs.integration-tests.result }}" == "failure" ]; then
            echo "❌ Tests failed"
            exit 1
          fi
          echo "✅ All integration tests passed"
