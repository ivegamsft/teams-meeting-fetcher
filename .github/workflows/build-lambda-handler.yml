name: Build Lambda - Handler

on:
  push:
    branches:
      - develop
    paths:
      - "apps/aws-lambda/**"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "apps/aws-lambda/**"
  workflow_dispatch:

jobs:
  build:
    name: Build Handler Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "apps/aws-lambda/package-lock.json"

      - name: Install Lambda dependencies
        run: |
          cd apps/aws-lambda
          npm ci

      - name: Validate handler
        run: |
          cd apps/aws-lambda
          node -c handler.js

      - name: Package Lambda
        run: |
          cd apps/aws-lambda
          rm -f lambda.zip
          zip -r lambda.zip handler.js node_modules -x "*.git*" "*.md"

      - name: Verify package
        run: |
          cd apps/aws-lambda
          if [ ! -f lambda.zip ]; then
            echo "Package failed: lambda.zip not created"
            exit 1
          fi
          ZIPSIZE=$(stat -f%z lambda.zip 2>/dev/null || stat -c%s lambda.zip)
          echo "Lambda package size: ${ZIPSIZE} bytes"

      - name: Upload Handler Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-handler-artifact
          path: apps/aws-lambda/lambda.zip
          retention-days: 30
