name: Deploy Admin App

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (default: latest)"
        required: false
        default: "latest"
        type: string
  workflow_run:
    workflows: ["Build Admin App"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VERSION: "1.14.3"
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
  TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}
  TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Resolve ECS resources from Terraform state
        id: tf-output
        run: |
          cd iac
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=$TF_STATE_REGION" \
            -backend-config="dynamodb_table=$TF_STATE_LOCK_TABLE" \
            -backend-config="encrypt=true"
          echo "ecr_repo=$(terraform output -raw admin_app_ecr_repository_url)" >> $GITHUB_OUTPUT
          echo "cluster_name=$(terraform output -raw admin_app_ecs_cluster_name)" >> $GITHUB_OUTPUT
          echo "service_name=$(terraform output -raw admin_app_ecs_service_name)" >> $GITHUB_OUTPUT
          echo "task_family=$(terraform output -json admin_app_task_definition_arn | jq -r 'split("/")[1] | split(":")[0]')" >> $GITHUB_OUTPUT

      - name: Determine image tag
        id: image
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
            TAG="${SHA:0:7}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get current task definition
        id: task-def
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${{ steps.tf-output.outputs.task_family }}" \
            --query 'taskDefinition' \
            --output json)

          ECR_REPO="${{ steps.tf-output.outputs.ecr_repo }}"
          IMAGE_TAG="${{ steps.image.outputs.tag }}"
          NEW_IMAGE="${ECR_REPO}:${IMAGE_TAG}"

          # Update image and clear ENTRA_REDIRECT_URI so app auto-discovers its IP
          echo "$TASK_DEF" | jq \
            --arg image "$NEW_IMAGE" \
            '.containerDefinitions[0].image = $image |
             .containerDefinitions[0].environment = [.containerDefinitions[0].environment[] | if .name == "ENTRA_REDIRECT_URI" then .value = "" else . end] |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            > /tmp/task-def.json

          echo "Registering new task definition with image: ${NEW_IMAGE}"

      - name: Register new task definition
        id: register
        run: |
          NEW_TASK_DEF=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_def_arn=${NEW_TASK_DEF}" >> $GITHUB_OUTPUT
          echo "Registered: ${NEW_TASK_DEF}"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "${{ steps.tf-output.outputs.cluster_name }}" \
            --service "${{ steps.tf-output.outputs.service_name }}" \
            --task-definition "${{ steps.register.outputs.task_def_arn }}" \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for service stability
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster "${{ steps.tf-output.outputs.cluster_name }}" \
            --services "${{ steps.tf-output.outputs.service_name }}" \
            --region ${{ env.AWS_REGION }} || echo "::warning::Service did not stabilize within timeout"

      - name: Discover new task IP
        id: task-ip
        run: |
          CLUSTER="${{ steps.tf-output.outputs.cluster_name }}"
          SERVICE="${{ steps.tf-output.outputs.service_name }}"

          TASK_ARN=$(aws ecs list-tasks --cluster "$CLUSTER" --service-name "$SERVICE" \
            --query 'taskArns[0]' --output text)
          ENI=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].attachments[0].details[?name==`networkInterfaceId`].value' --output text)
          IP=$(aws ec2 describe-network-interfaces --network-interface-ids "$ENI" \
            --query 'NetworkInterfaces[0].Association.PublicIp' --output text)

          echo "ip=${IP}" >> $GITHUB_OUTPUT
          echo "Task public IP: ${IP}"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Entra redirect URI
        run: |
          IP="${{ steps.task-ip.outputs.ip }}"
          APP_ID=$(cd iac && terraform output -raw admin_app_entra_client_id)
          NEW_URI="https://${IP}:3000/auth/callback"

          echo "Setting redirect URI to: ${NEW_URI}"
          OBJECT_ID=$(az ad app show --id "$APP_ID" --query id -o tsv)
          az rest --method PATCH \
            --uri "https://graph.microsoft.com/v1.0/applications/${OBJECT_ID}" \
            --body "{\"web\":{\"redirectUris\":[\"${NEW_URI}\"]}}"
          echo "Entra redirect URI updated successfully"

      - name: Deployment Summary
        run: |
          echo "Admin App deployed to ECS"
          echo "Cluster: ${{ steps.tf-output.outputs.cluster_name }}"
          echo "Service: ${{ steps.tf-output.outputs.service_name }}"
          echo "Task Definition: ${{ steps.register.outputs.task_def_arn }}"
          echo "Image: ${{ steps.tf-output.outputs.ecr_repo }}:${{ steps.image.outputs.tag }}"
          echo "Public IP: ${{ steps.task-ip.outputs.ip }}"
          echo "URL: https://${{ steps.task-ip.outputs.ip }}:3000"
