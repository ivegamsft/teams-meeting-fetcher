name: Deploy Admin App

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (default: latest)"
        required: false
        default: "latest"
        type: string
  workflow_run:
    workflows: ["Build Admin App"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VERSION: "1.14.3"
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
  TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}
  TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Resolve ECS resources from Terraform state
        id: tf-output
        run: |
          cd iac
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=$TF_STATE_REGION" \
            -backend-config="dynamodb_table=$TF_STATE_LOCK_TABLE" \
            -backend-config="encrypt=true"
          echo "ecr_repo=$(terraform output -raw admin_app_ecr_repository_url)" >> $GITHUB_OUTPUT
          echo "cluster_name=$(terraform output -raw admin_app_ecs_cluster_name)" >> $GITHUB_OUTPUT
          echo "service_name=$(terraform output -raw admin_app_ecs_service_name)" >> $GITHUB_OUTPUT
          echo "task_family=$(terraform output -json admin_app_task_definition_arn | jq -r 'split("/")[1] | split(":")[0]')" >> $GITHUB_OUTPUT

      - name: Determine image tag
        id: image
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
            TAG="${SHA:0:7}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get current task definition
        id: task-def
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${{ steps.tf-output.outputs.task_family }}" \
            --query 'taskDefinition' \
            --output json)

          # Update the image in the container definition
          ECR_REPO="${{ steps.tf-output.outputs.ecr_repo }}"
          IMAGE_TAG="${{ steps.image.outputs.tag }}"
          NEW_IMAGE="${ECR_REPO}:${IMAGE_TAG}"

          echo "$TASK_DEF" | jq \
            --arg image "$NEW_IMAGE" \
            '.containerDefinitions[0].image = $image |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            > /tmp/task-def.json

          echo "Registering new task definition with image: ${NEW_IMAGE}"

      - name: Register new task definition
        id: register
        run: |
          NEW_TASK_DEF=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_def_arn=${NEW_TASK_DEF}" >> $GITHUB_OUTPUT
          echo "Registered: ${NEW_TASK_DEF}"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "${{ steps.tf-output.outputs.cluster_name }}" \
            --service "${{ steps.tf-output.outputs.service_name }}" \
            --task-definition "${{ steps.register.outputs.task_def_arn }}" \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for service stability
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster "${{ steps.tf-output.outputs.cluster_name }}" \
            --services "${{ steps.tf-output.outputs.service_name }}" \
            --region ${{ env.AWS_REGION }} || echo "::warning::Service did not stabilize within timeout"

      - name: Update Entra redirect URI with new task IP
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          set -euo pipefail
          CLUSTER="${{ steps.tf-output.outputs.cluster_name }}"
          SERVICE="${{ steps.tf-output.outputs.service_name }}"

          # Discover the new task's public IP
          for i in $(seq 1 18); do
            TASK_ARN=$(aws ecs list-tasks --cluster "$CLUSTER" --service-name "$SERVICE" \
              --query 'taskArns[0]' --output text 2>/dev/null || echo "None")
            if [ "$TASK_ARN" != "None" ] && [ -n "$TASK_ARN" ]; then
              STATUS=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
                --query 'tasks[0].lastStatus' --output text 2>/dev/null || echo "")
              if [ "$STATUS" = "RUNNING" ]; then
                ENI_ID=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
                  --query 'tasks[0].attachments[0].details[?name==`networkInterfaceId`].value' --output text)
                PUBLIC_IP=$(aws ec2 describe-network-interfaces --network-interface-ids "$ENI_ID" \
                  --query 'NetworkInterfaces[0].Association.PublicIp' --output text)
                if [ -n "$PUBLIC_IP" ] && [ "$PUBLIC_IP" != "None" ]; then
                  echo "Task IP: $PUBLIC_IP"
                  REDIRECT_URI="http://${PUBLIC_IP}:3000/auth/callback"

                  # Update Entra app redirect URI via Terraform
                  cd iac
                  terraform init \
                    -backend-config="bucket=$TF_STATE_BUCKET" \
                    -backend-config="key=$TF_STATE_KEY" \
                    -backend-config="region=$TF_STATE_REGION" \
                    -backend-config="dynamodb_table=$TF_STATE_LOCK_TABLE" \
                    -backend-config="encrypt=true"

                  # Import current redirect URIs and check if update needed
                  CURRENT=$(terraform state show 'azuread_application_redirect_uris.admin_app' 2>/dev/null | grep -o 'http://[^"]*' || echo "")
                  if [ "$CURRENT" = "$REDIRECT_URI" ]; then
                    echo "Redirect URI already correct"
                  else
                    echo "Updating Entra redirect URI to: $REDIRECT_URI"
                    terraform apply -auto-approve \
                      -target='azuread_application_redirect_uris.admin_app' \
                      -var="use_oidc=true" \
                      -var="azure_subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
                      -var="azure_tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
                      -var="azure_client_id=${{ secrets.AZURE_CLIENT_ID }}" \
                      -var="aws_account_id=${{ vars.AWS_ACCOUNT_ID }}" \
                      -var="webhook_bucket_name=${{ vars.WEBHOOK_BUCKET_NAME }}" \
                      -var="transcript_bucket_name=${{ vars.TRANSCRIPT_BUCKET_NAME }}" \
                      -var="checkpoint_bucket_name=${{ vars.CHECKPOINT_BUCKET_NAME }}" \
                      -var="bot_messaging_endpoint=${{ vars.BOT_MESSAGING_ENDPOINT }}" \
                      -var='client_state=${{ secrets.CLIENT_STATE }}' \
                      -var='admin_app_session_secret=${{ secrets.ADMIN_APP_SESSION_SECRET }}' \
                      -var='admin_app_api_key=${{ secrets.ADMIN_APP_API_KEY }}' \
                      -var='admin_app_dashboard_password=${{ secrets.ADMIN_APP_DASHBOARD_PASSWORD }}' \
                      -var="sanitized_transcript_bucket_name=${{ vars.SANITIZED_TRANSCRIPT_BUCKET_NAME }}"
                  fi
                  exit 0
                fi
              fi
            fi
            echo "Waiting for task... ($i/18)"
            sleep 10
          done
          echo "::warning::Could not discover task IP for redirect URI update"

      - name: Deployment Summary
        run: |
          echo "Admin App deployed to ECS"
          echo "Cluster: ${{ steps.tf-output.outputs.cluster_name }}"
          echo "Service: ${{ steps.tf-output.outputs.service_name }}"
          echo "Task Definition: ${{ steps.register.outputs.task_def_arn }}"
          echo "Image: ${{ steps.tf-output.outputs.ecr_repo }}:${{ steps.image.outputs.tag }}"
