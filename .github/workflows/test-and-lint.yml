name: CI - Lint, Type Check & Test

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop

jobs:
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: "apps/aws-lambda/package-lock.json"

      - name: Install dependencies
        run: |
          cd apps/aws-lambda
          npm ci

      - name: Lint
        run: |
          cd apps/aws-lambda
          npm run lint || echo "No lint script configured"

      - name: Type Check
        run: |
          cd apps/aws-lambda
          npm run type-check || echo "No type-check script configured"

      - name: Run tests
        run: |
          cd apps/aws-lambda
          npm test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/aws-lambda/coverage/lcov.info
          fail_ci_if_error: false
