name: Deploy Lambda - Authorizer

on:
  push:
    branches:
      - main
    paths:
      - "apps/aws-lambda-authorizer/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VERSION: "1.5.0"
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
  TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}
  TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}

jobs:
  deploy:
    name: Deploy Authorizer Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Resolve Lambda name
        id: tf-output
        run: |
          cd iac
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=$TF_STATE_REGION" \
            -backend-config="dynamodb_table=$TF_STATE_LOCK_TABLE" \
            -backend-config="encrypt=true"
          LAMBDA_NAME=$(terraform output -raw aws_authorizer_function_name)
          echo "lambda_name=$LAMBDA_NAME" >> $GITHUB_OUTPUT

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install Authorizer dependencies
        run: |
          cd apps/aws-lambda-authorizer
          npm ci

      - name: Package Lambda
        run: |
          cd apps/aws-lambda-authorizer
          rm -f authorizer.zip
          zip -r authorizer.zip authorizer.js node_modules -x "*.git*" "*.md"

      - name: Deploy Lambda code
        run: |
          aws lambda update-function-code \
            --function-name ${{ steps.tf-output.outputs.lambda_name }} \
            --zip-file fileb://apps/aws-lambda-authorizer/authorizer.zip \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ steps.tf-output.outputs.lambda_name }} \
            --region ${{ env.AWS_REGION }}

      - name: Deployment Summary
        run: |
          echo "Authorizer Lambda deployed"
          echo "Function: ${{ steps.tf-output.outputs.lambda_name }}"
          echo "Region: ${{ env.AWS_REGION }}"
