name: Squad Preview Validation

on:
  push:
    branches: [preview]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Teams app manifest
        run: |
          python3 -c "import json; json.load(open('apps/teams-app/manifest.json'))" && echo "✅ Manifest valid"

      - name: Validate Terraform
        run: |
          # Check for syntax issues in .tf files
          if command -v terraform &> /dev/null; then
            (cd iac/aws && terraform fmt -check -recursive -diff)
            (cd iac/azure && terraform fmt -check -recursive -diff)
          else
            echo "ℹ️ Terraform not installed — skipping format check"
          fi
