name: Security Scan - Secret Detection

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

jobs:
  secret-scan:
    name: Detect Secrets & Credentials
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@v3.88.0
        if: github.event_name == 'pull_request'
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --debug --only-verified

      - name: TruffleHog Secret Scan (push)
        uses: trufflesecurity/trufflehog@v3.88.0
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --debug --only-verified

      - name: Check for common patterns
        run: |
          echo "🔍 Scanning for common credential patterns..."

          # Check for AWS access keys
          if grep -r "AKIA" . --include="*.js" --include="*.ts" --include="*.json" --include="*.py" --include="*.sh" \
             --exclude-dir=node_modules --exclude-dir=.git -q; then
            echo "⚠️ WARNING: Potential AWS access key found"
            exit 1
          fi

          # Check for Azure connection strings
          if grep -r "DefaultEndpointsProtocol" . --include="*.js" --include="*.ts" --include="*.json" --include="*.py" \
             --exclude-dir=node_modules --exclude-dir=.git -q; then
            echo "⚠️ WARNING: Potential Azure connection string found"
            exit 1
          fi

          # Check for unencrypted credentials in env examples
          if grep -r "GRAPH_CLIENT_SECRET=sk-" . --include=".env*" -q; then
            echo "⚠️ WARNING: Credentials found in env files"
            exit 1
          fi

          echo "✅ No obvious credentials detected"

      - name: Gitignore validation
        run: |
          echo "🔍 Validating .gitignore coverage..."

          # Check that sensitive files are gitignored
          if git status | grep -E "\.env\.local|\.tfvars|\.pem|\.key" ; then
            echo "❌ ERROR: Sensitive files are not gitignored!"
            exit 1
          fi

          echo "✅ .gitignore patterns valid"

  dependency-check:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "apps/aws-lambda/package-lock.json"

      - name: Install dependencies
        run: |
          cd apps/aws-lambda
          npm ci

      - name: Audit dependencies
        run: |
          cd apps/aws-lambda
          npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for known vulnerabilities
        continue-on-error: true
        run: |
          cd apps/aws-lambda
          echo "Scanning for known npm vulnerabilities..."
          if npm audit 2>&1 | grep -i "high\|critical"; then
            echo "WARNING: High/Critical vulnerabilities found"
            npm audit || true
          fi
