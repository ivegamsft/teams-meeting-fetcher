name: Squad Docs — Build & Deploy

on:
  workflow_dispatch:
  push:
    branches: [preview]
    paths:
      - 'docs/**'
      - '.github/workflows/squad-docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate documentation
        run: |
          # Check that key docs exist
          for doc in README.md DEPLOYMENT.md CONFIGURATION.md QUICK_REFERENCE.md; do
            if [ -f "$doc" ]; then
              echo "✅ $doc exists"
            else
              echo "⚠️ $doc not found"
            fi
          done

          # Check for broken markdown links (basic)
          echo "📋 Documentation files:"
          find docs/ -name "*.md" -type f 2>/dev/null | head -20 || echo "No docs/ directory found"
