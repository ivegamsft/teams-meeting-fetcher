name: Build Lambda - Meeting Bot

on:
  push:
    branches:
      - develop
    paths:
      - "apps/meeting-bot/**"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "apps/meeting-bot/**"
  workflow_dispatch:

jobs:
  build:
    name: Build Meeting Bot Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "apps/meeting-bot/package-lock.json"

      - name: Install Meeting Bot dependencies
        run: |
          cd apps/meeting-bot
          npm ci

      - name: Validate entrypoint
        run: |
          cd apps/meeting-bot
          node -c index.js

      - name: Package Lambda
        run: |
          cd apps/meeting-bot
          rm -f meeting-bot.zip
          zip -r meeting-bot.zip index.js graph-client.js node_modules -x "*.git*" "*.md"

      - name: Verify package
        run: |
          cd apps/meeting-bot
          if [ ! -f meeting-bot.zip ]; then
            echo "Package failed: meeting-bot.zip not created"
            exit 1
          fi
          ZIPSIZE=$(stat -f%z meeting-bot.zip 2>/dev/null || stat -c%s meeting-bot.zip)
          echo "Meeting bot package size: ${ZIPSIZE} bytes"

      - name: Upload Meeting Bot Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-meeting-bot-artifact
          path: apps/meeting-bot/meeting-bot.zip
          retention-days: 30
