name: Deploy to Azure

on:
  push:
    branches:
      - main
    paths:
      - "iac/azure/**"
      - ".github/workflows/deploy-azure.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  TF_VERSION: "1.5.0"

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Validate Azure Tenant & Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Tenant
        id: tenant
        run: |
          TENANT_ID=$(az account show --query tenantId -o tsv)
          echo "tenant_id=$TENANT_ID" >> $GITHUB_OUTPUT

          # Verify it matches expected tenant
          if [ "$TENANT_ID" != "${{ secrets.EXPECTED_TENANT_ID }}" ]; then
            echo "❌ TENANT MISMATCH!"
            echo "Expected: ${{ secrets.EXPECTED_TENANT_ID }}"
            echo "Active: $TENANT_ID"
            exit 1
          fi
          echo "✅ Tenant verified: $TENANT_ID"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: |
          cd iac/azure
          terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Terraform validate
        run: |
          cd iac/azure
          terraform validate
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Terraform plan
        run: |
          cd iac/azure
          terraform plan -out=tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Upload terraform plan
        uses: actions/upload-artifact@v3
        with:
          name: tfplan-azure
          path: iac/azure/tfplan
          retention-days: 1

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment:
      name: azure-${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Tenant (safety check)
        run: |
          TENANT_ID=$(az account show --query tenantId -o tsv)
          if [ "$TENANT_ID" != "${{ secrets.EXPECTED_TENANT_ID }}" ]; then
            echo "❌ TENANT MISMATCH - Deployment blocked!"
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download terraform plan
        uses: actions/download-artifact@v3
        with:
          name: tfplan-azure
          path: iac/azure/

      - name: Terraform init
        run: |
          cd iac/azure
          terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Terraform apply
        run: |
          cd iac/azure
          terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Update env file
        run: |
          pwsh -File scripts/generate-azure-env.ps1

      - name: Show deployment outputs
        run: |
          cd iac/azure
          terraform output

      - name: Deployment Summary
        run: |
          echo "✅ Azure Deployment Complete"
          echo "Subscription: ${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          echo "Tenant: ${{ secrets.EXPECTED_TENANT_ID }}"
