name: Deploy to Azure

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# REQUIRED GITHUB SECRETS:
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# AZURE_CLIENT_ID               - Azure App Registration client ID for OIDC
# AZURE_TENANT_ID               - Azure AD tenant ID
# AZURE_SUBSCRIPTION_ID         - Azure subscription ID
# EXPECTED_TENANT_ID            - Expected tenant ID for safety check
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

on:
  push:
    branches:
      - main
    paths:
      - "iac/azure/**"
      - ".github/workflows/deploy-azure.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  TF_VERSION: "1.14.3"

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Validate Azure Tenant & Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Tenant
        id: tenant
        run: |
          TENANT_ID=$(az account show --query tenantId -o tsv)
          echo "tenant_id=$TENANT_ID" >> $GITHUB_OUTPUT

          # Verify it matches expected tenant
          if [ "$TENANT_ID" != "${{ secrets.EXPECTED_TENANT_ID }}" ]; then
            echo "❌ TENANT MISMATCH!"
            echo "Expected: ${{ secrets.EXPECTED_TENANT_ID }}"
            echo "Active: $TENANT_ID"
            exit 1
          fi
          echo "✅ Tenant verified: $TENANT_ID"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: |
          cd iac/azure
          terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
          TF_VAR_use_oidc: "true"

      - name: Terraform validate
        run: |
          cd iac/azure
          terraform validate
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
          TF_VAR_use_oidc: "true"

      - name: Terraform plan
        run: |
          cd iac/azure
          terraform plan -out=tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
          TF_VAR_use_oidc: "true"
          TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Upload terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-azure
          path: iac/azure/tfplan
          retention-days: 1

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment:
      name: azure-${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Tenant (safety check)
        run: |
          TENANT_ID=$(az account show --query tenantId -o tsv)
          if [ "$TENANT_ID" != "${{ secrets.EXPECTED_TENANT_ID }}" ]; then
            echo "TENANT MISMATCH - Deployment blocked!"
            exit 1
          fi

      - name: Get runner IP
        id: runner-ip
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          # GitHub Actions runners can have multiple outbound IPs in the same
          # subnet. Use a /24 CIDR to cover all of them instead of a single /32.
          RUNNER_CIDR=$(echo "$RUNNER_IP" | sed 's/\.[0-9]*$/.0\/24/')
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          echo "runner_cidr=$RUNNER_CIDR" >> $GITHUB_OUTPUT
          echo "Runner IP: $RUNNER_IP — using CIDR: $RUNNER_CIDR"

      - name: Get resource names from Terraform output
        id: resources
        run: |
          cd iac/azure
          # Try to get resource names from Terraform state; fall back to secrets/variables
          terraform init -input=false > /dev/null 2>&1 || true
          KV_NAME=$(terraform output -raw key_vault_name 2>/dev/null || echo "")
          STORAGE_NAME=$(terraform output -raw storage_account_name 2>/dev/null || echo "")
          RG_NAME=$(terraform output -raw resource_group_name 2>/dev/null || echo "")
          echo "kv_name=$KV_NAME" >> $GITHUB_OUTPUT
          echo "storage_name=$STORAGE_NAME" >> $GITHUB_OUTPUT
          echo "rg_name=$RG_NAME" >> $GITHUB_OUTPUT
          echo "Key Vault: $KV_NAME | Storage: $STORAGE_NAME | RG: $RG_NAME"
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
          TF_VAR_use_oidc: "true"

      - name: Add runner CIDR to Key Vault firewall
        if: steps.resources.outputs.kv_name != ''
        run: |
          NAME="${{ steps.resources.outputs.kv_name }}"
          CIDR="${{ steps.runner-ip.outputs.runner_cidr }}"

          DEFAULT_ACTION=$(az keyvault show -n "$NAME" --query "properties.networkAcls.defaultAction" -o tsv 2>/dev/null || echo "unknown")
          if [ "$DEFAULT_ACTION" != "Deny" ]; then
            echo "Key Vault '$NAME' default action is '$DEFAULT_ACTION' (not Deny). Skipping."
            exit 0
          fi

          echo "Adding runner CIDR $CIDR to Key Vault '$NAME' firewall..."
          az keyvault network-rule add --name "$NAME" --ip-address "$CIDR" --only-show-errors
          echo "Successfully added $CIDR to Key Vault '$NAME'."

      - name: Add runner CIDR to Storage Account firewall
        if: steps.resources.outputs.storage_name != '' && steps.resources.outputs.rg_name != ''
        run: |
          NAME="${{ steps.resources.outputs.storage_name }}"
          RG="${{ steps.resources.outputs.rg_name }}"
          CIDR="${{ steps.runner-ip.outputs.runner_cidr }}"

          DEFAULT_ACTION=$(az storage account show -n "$NAME" -g "$RG" --query "networkRuleSet.defaultAction" -o tsv 2>/dev/null || echo "unknown")
          if [ "$DEFAULT_ACTION" != "Deny" ]; then
            echo "Storage Account '$NAME' default action is '$DEFAULT_ACTION' (not Deny). Skipping."
            exit 0
          fi

          echo "Adding runner CIDR $CIDR to Storage Account '$NAME' firewall..."
          az storage account network-rule add -n "$NAME" -g "$RG" --ip-address "$CIDR" --only-show-errors
          echo "Successfully added $CIDR to Storage Account '$NAME'."

      - name: Wait for firewall propagation
        if: steps.resources.outputs.kv_name != '' || steps.resources.outputs.storage_name != ''
        run: |
          echo "Waiting 15s for firewall rule propagation..."
          sleep 15

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download terraform plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-azure
          path: iac/azure/

      - name: Terraform init
        run: |
          cd iac/azure
          terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
          TF_VAR_use_oidc: "true"

      - name: Terraform apply
        run: |
          cd iac/azure
          terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
          TF_VAR_use_oidc: "true"
          TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Update env file
        run: |
          pwsh -File scripts/config/generate-azure-env.ps1

      - name: Show deployment outputs
        run: |
          cd iac/azure
          terraform output

      - name: Deployment Summary
        run: |
          echo "Azure Deployment Complete"
          echo "Subscription: ${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          echo "Tenant: ${{ secrets.EXPECTED_TENANT_ID }}"

      # --- Cleanup: always remove runner IP from firewalls ---

      - name: Remove runner CIDR from Key Vault firewall
        if: always() && steps.resources.outputs.kv_name != ''
        run: |
          NAME="${{ steps.resources.outputs.kv_name }}"
          CIDR="${{ steps.runner-ip.outputs.runner_cidr }}"

          DEFAULT_ACTION=$(az keyvault show -n "$NAME" --query "properties.networkAcls.defaultAction" -o tsv 2>/dev/null || echo "unknown")
          if [ "$DEFAULT_ACTION" != "Deny" ]; then
            echo "Key Vault '$NAME' default action is '$DEFAULT_ACTION' (not Deny). Skipping removal."
            exit 0
          fi

          echo "Removing runner CIDR $CIDR from Key Vault '$NAME' firewall..."
          az keyvault network-rule remove --name "$NAME" --ip-address "$CIDR" --only-show-errors || true
          echo "Successfully removed $CIDR from Key Vault '$NAME'."

      - name: Remove runner CIDR from Storage Account firewall
        if: always() && steps.resources.outputs.storage_name != '' && steps.resources.outputs.rg_name != ''
        run: |
          NAME="${{ steps.resources.outputs.storage_name }}"
          RG="${{ steps.resources.outputs.rg_name }}"
          CIDR="${{ steps.runner-ip.outputs.runner_cidr }}"

          DEFAULT_ACTION=$(az storage account show -n "$NAME" -g "$RG" --query "networkRuleSet.defaultAction" -o tsv 2>/dev/null || echo "unknown")
          if [ "$DEFAULT_ACTION" != "Deny" ]; then
            echo "Storage Account '$NAME' default action is '$DEFAULT_ACTION' (not Deny). Skipping removal."
            exit 0
          fi

          echo "Removing runner CIDR $CIDR from Storage Account '$NAME' firewall..."
          az storage account network-rule remove -n "$NAME" -g "$RG" --ip-address "$CIDR" --only-show-errors || true
          echo "Successfully removed $CIDR from Storage Account '$NAME'."
